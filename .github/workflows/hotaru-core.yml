name: hotaru-core

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: hotaru-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default:
    name: default features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Check hotaru_core default features
        run: cargo check -p hotaru_core

  # Host `cargo check` for non-default feature combinations that cannot run
  # bare-metal (every non-default `std` combo) plus the `embedded` combos not
  # exercised by the bare-metal jobs below. The crate's default feature set is
  # covered by the dedicated default job above, so it is not repeated here.
  feature-matrix:
    name: ${{ matrix.features }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - full_regex,std,spawn_local
          - full_regex,embedded,spawn_send
          - full_regex,embedded,spawn_local
          - lite_regex,std,spawn_send
          - lite_regex,std,spawn_local
          - lite_regex,embedded,spawn_send
          # `dev-log` is an additive marker feature; the embedded `dev-log`
          # combo is covered once by the bare-metal jobs below.
          - full_regex,std,spawn_send,dev-log
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Check hotaru_core feature set
        run: cargo check -p hotaru_core --no-default-features --features "${{ matrix.features }}"

  # Bare-metal no_std builds — proves the crate actually links on real embedded
  # targets, not just that it typechecks on the host where std is silently
  # available. Each feature combination is assigned to a single target so no
  # combination is compiled more than once; the three arches together still
  # exercise ARM, RISC-V-with-atomics, and RISC-V-without-atomics, plus both
  # the spin and RefCell lock backends.
  no-std-targets:
    name: bare-metal ${{ matrix.target }} / ${{ matrix.features }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ARM Cortex-M4/M7 with FPU. Covers the STM32F4/F7/H7/L4/L5/H5
          # families, Nordic nRF52840, and most other Cortex-M4-class boards.
          # `spawn_local` exercises the RefCell lock backend; `spawn_local_atomic`
          # exercises the spin backend.
          - target: thumbv7em-none-eabihf
            features: lite_regex,embedded,spawn_local
            allow_failure: false
          - target: thumbv7em-none-eabihf
            features: lite_regex,embedded,spawn_local_atomic
            allow_failure: false
          # RISC-V with atomics (imac). Covers ESP32-C6/P4, most SiFive chips,
          # and BL616. Carries the embedded `dev-log` combo.
          - target: riscv32imac-unknown-none-elf
            features: lite_regex,embedded,spawn_local,dev-log
            allow_failure: false
          # RISC-V without atomics (imc). No regex feature means no regex dep.
          - target: riscv32imc-unknown-none-elf
            features: embedded,spawn_local_no_atomic
            allow_failure: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust stable + bare-metal target
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable
      - name: Build hotaru_core for ${{ matrix.target }}
        # `build` (not `check`) so the linker step actually runs — that's
        # what caught `regex-lite`'s std dependency during development.
        run: |
          cargo build -p hotaru_core \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features "${{ matrix.features }}"

  # Facade no_std / no-atomic coverage — proves the umbrella crate does not
  # leak Tokio/std defaults when embedding through `hotaru`.
  hotaru-facade-no-std-targets:
    name: hotaru facade bare-metal ${{ matrix.target }} / ${{ matrix.features }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # RISC-V without atomics (imc). Uses no regex feature so the regex
          # dependency is absent, and spawn_local_no_atomic selects Rc/RefCell.
          - target: riscv32imc-unknown-none-elf
            features: embedded,io_embedded,spawn_local_no_atomic
            allow_failure: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust stable + bare-metal target
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable
      - name: Build hotaru facade for ${{ matrix.target }}
        run: |
          cargo build -p hotaru \
            --target ${{ matrix.target }} \
            --no-default-features \
            --features "${{ matrix.features }}"
