[package]
name = "hotaru_http"
version = "0.8.0"
edition = "2024"
authors = ["Redstone <redstone@fds.moe>"]
description = "gRPC support for the Hotaru web framework"
license = "MIT OR Apache-2.0"
repository = "https://github.com/hotaru/hotaru"
keywords = ["grpc", "rpc", "protobuf", "hotaru", "http2"]
categories = ["network-programming", "web-programming"]

[dependencies]
# Hotaru dependencies
hotaru_core = { path = "../hotaru_core", version = "0.8.0" }
hotaru_lib = { path = "../hotaru_lib", version = "0.7.2", features = ["url_encoding", "compression"] }
hotaru_tls = { path = "../hotaru_tls", version = "0.8.0", optional = true }

akari = { version = "0.2.6", features = ["full"] }
once_cell = "1.19"
async-trait = "0.1.88"
bytes = "1"
futures = "0.3"

tokio = { version = "1.28", features = ["full"] }

[features]
default = []
tls = ["dep:hotaru_tls"]

[dev-dependencies]
tokio-test = "0.4"
once_cell = "1.19" 
