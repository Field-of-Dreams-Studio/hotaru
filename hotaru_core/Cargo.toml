[package]
name = "hotaru_core"
version = "0.8.2"
edition = "2024"
authors = ["Redstone <redstone@fds.moe>"] 
description = "Small, sweet, easy framework for full-stack web application" 
license = "MIT"
repository = "https://github.com/Field-of-Dreams-Studio/hotaru"
homepage = "https://hotaru.rs"
categories = ["network-programming", "web-programming::http-server"]
keywords = ["hotaru"]

[dependencies]
akari = { version = "0.2.8", default-features = false, features = ["dynamic", "extension", "object_macro"] }
tokio = { version = "1.28", features = ["full"] }
parking_lot = "0.12"
av = "0.1"

hotaru_lib = { version = "0.8.2", path = "../hotaru_lib" , features = ["url_encoding"] }
# Unicode features are pulled in by the `full` / `lite` features below — keep
# this list to perf-only flags so the unicode footprint stays opt-in.
regex = { version = "1.12", default-features = false, features = [
    "perf-dfa",
    "perf-onepass",
    "perf-backtrack",
    "perf-inline",
    "perf-cache",
] }
futures = "0.3"
futures-core = "0.3"
futures-util = "0.3"
tokio-util = { version = "0.7", features = ["codec"] }
async-trait = "0.1.88"

[dev-dependencies]
hex = "0.4"
serde_json = "1.0"
rand = "0.8"
quickcheck = "1.0"
env_logger = "0.10"

[features]
default = ["full"]
full = ["regex/unicode", "akari/full"]        # normal devices
lite = ["regex/unicode-perl", "akari/no_std"] # small devices

dev-log = [] # Feature for debugging hotaru
