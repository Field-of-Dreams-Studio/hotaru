[package]
name = "hotaru_core"
version = "0.8.2"
edition = "2024"
authors = ["Redstone <redstone@fds.moe>"] 
description = "Small, sweet, easy framework for full-stack web application" 
license = "MIT"
repository = "https://github.com/Field-of-Dreams-Studio/hotaru"
homepage = "https://hotaru.rs"
categories = ["network-programming", "web-programming::http-server"]
keywords = ["hotaru"]

[dependencies]
akari = { version = "0.2.8", default-features = false, features = ["dynamic", "extension", "object_macro"] }
# Async runtime ā€” still a hard (mandatory) dep today; the framework's spawn /
# OnceCell / select uses are unconditional. The `tokio` feature gates only the
# `connection::io` tokio<->Hotaru blanket impls. Making tokio truly optional is
# a later stage.
tokio = { version = "1.28", features = ["full"] }
# Sync backends ā€” exactly one of `std-sync` (parking_lot) or `embedded` (spin)
# must be enabled. Default features include `std-sync`.
parking_lot = { version = "0.12", optional = true }
spin = { version = "0.12", default-features = false, features = ["mutex", "spin_mutex", "rwlock"], optional = true }
# Async IO backend for the `embedded` feature; the blanket `HotaruRead` /
# `HotaruWrite` / `HotaruBufRead` impls in `connection::io` bridge to it.
embedded-io-async = { version = "0.6", default-features = false, optional = true }
av = "0.1"

hotaru_lib = { version = "0.8.2", path = "../hotaru_lib", default-features = false, features = ["url_encoding"] }
# Unicode features are pulled in by the `full` / `lite` features below ā€” keep
# this list to perf-only flags so the unicode footprint stays opt-in.
regex = { version = "1.12", default-features = false, features = [
    "perf-dfa",
    "perf-onepass",
    "perf-backtrack",
    "perf-inline",
    "perf-cache",
] }
futures = "0.3"
futures-core = "0.3"
futures-util = "0.3"
tokio-util = { version = "0.7", features = ["codec"] }

[dev-dependencies]
hex = "0.4"
serde_json = "1.0"
rand = "0.8"
quickcheck = "1.0"
env_logger = "0.10"

[features]
default = ["full", "std", "tokio"]
full = ["regex/unicode", "akari/full"]        # normal devices
lite = ["regex/unicode-perl", "akari/no_std"] # small devices

# Target-flavour markers ā€” exactly one of `std` / `embedded` must be enabled.
# Today they gate the sync backend (parking_lot vs spin); future stages will
# fold more std-vs-no_std switches into the same markers (runtime feature
# gates, error variants, etc.).
std = ["dep:parking_lot"]                                  # std target
embedded = ["dep:spin", "dep:embedded-io-async"]           # no_std-friendly target

# Async-runtime marker. Enabling `tokio` turns on the tokio<->Hotaru blanket
# impls in `connection::io::rw` and auto-enables `std`. The tokio crate itself
# stays a mandatory dependency for now; this feature only gates the blanket
# impls. Mutually exclusive with `embedded` by transitive conflict
# (`tokio` -> `std`, and `std` + `embedded` already conflict).
tokio = ["std"]

dev-log = [] # Feature for debugging hotaru
